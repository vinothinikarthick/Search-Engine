<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People Search Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
padding:30px;
color:#fff;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:25px;
}

.search-wrapper{
position:relative;
}

.search-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

button{
padding:15px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.search-btn{
background:#2563eb;
color:white;
}

.clear-btn{
background:#dc2626;
color:white;
}

#suggestions{
position:absolute;
top:65px;
left:0;
width:100%;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.25);
z-index:9999;
display:none;
max-height:450px;
overflow-y:auto;
}

.suggestion{
padding:14px 18px;
cursor:pointer;
color:#111827;
border-bottom:1px solid #f1f5f9;
transition:.2s;
}

.suggestion:hover{
background:#eff6ff;
padding-left:24px;
}

.section-title{
background:#f8fafc;
font-weight:bold;
color:#111827;
cursor:default;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:25px;
margin-top:20px;
}

.profile{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.profile img{
width:220px;
border-radius:15px;
object-fit:cover;
}

.info{
flex:1;
}

.info h2{
margin-bottom:10px;
}

.info p{
line-height:1.7;
margin-bottom:10px;
}

.link-btn{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#22c55e;
border-radius:10px;
color:white;
text-decoration:none;
}

.history{
margin-top:20px;
}

.tag{
display:inline-block;
padding:8px 12px;
background:#334155;
border-radius:20px;
margin:5px;
cursor:pointer;
}

.tag:hover{
background:#475569;
}

.loading{
margin-top:20px;
text-align:center;
}

@media(max-width:768px){

.search-box{
flex-direction:column;
}

.profile img{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🔍 Search Portal</h1>

<div class="search-wrapper">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search a person..."
onkeyup="suggestSearch()"
onkeypress="if(event.key==='Enter') searchPerson()">

<button
class="search-btn"
onclick="searchPerson()">
Search
</button>

<button
class="clear-btn"
onclick="clearHistory()">
Clear History
</button>

</div>

<div id="suggestions"></div>

</div>

<div id="history" class="history"></div>

<div id="loading" class="loading"></div>

<div id="wikiResult"></div>

<div id="githubResult"></div>

</div>

<script>

loadHistory();

function saveHistory(term){

let history=
JSON.parse(localStorage.getItem("searchHistory"))||[];

history=history.filter(
item=>item!==term
);

history.unshift(term);

history=history.slice(0,10);

localStorage.setItem(
"searchHistory",
JSON.stringify(history)
);

loadHistory();
}

function loadHistory(){

let history=
JSON.parse(localStorage.getItem("searchHistory"))||[];

let html="";

if(history.length){

html+="<h3>Recent Searches</h3>";

history.forEach(item=>{

html+=`
<span class="tag"
onclick="quickSearch('${item}')">
${item}
</span>
`;

});

}

document.getElementById("history")
.innerHTML=html;
}

function clearHistory(){

localStorage.removeItem("searchHistory");

loadHistory();
}

function quickSearch(name){

document.getElementById("searchInput")
.value=name;

searchPerson();
}

async function suggestSearch(){

const query=
document.getElementById("searchInput")
.value.trim();

const suggestionBox=
document.getElementById("suggestions");

if(query.length<2){

suggestionBox.style.display="none";
return;
}

try{

let html="";

html+=`
<div class="suggestion"
onclick="window.open(
'https://www.google.com/search?q=${encodeURIComponent(query)}',
'_blank'
)">
🔍 Search Google for "${query}"
</div>
`;

const wikiResponse=
await fetch(
`https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=5&namespace=0&format=json&origin=*`
);

const wikiData=
await wikiResponse.json();

if(wikiData[1].length){

html+=`
<div class="suggestion section-title">
📖 Wikipedia Results
</div>
`;

wikiData[1].forEach(item=>{

html+=`
<div class="suggestion"
onclick="window.open(
'https://en.wikipedia.org/wiki/${encodeURIComponent(item)}',
'_blank'
)">
📖 ${item}
</div>
`;

});
}

const githubResponse=
await fetch(
`https://api.github.com/search/users?q=${encodeURIComponent(query)}`
);

const githubData=
await githubResponse.json();

if(githubData.items &&
githubData.items.length){

html+=`
<div class="suggestion section-title">
💻 GitHub Users
</div>
`;

githubData.items
.slice(0,5)
.forEach(user=>{

html+=`
<div class="suggestion"
onclick="window.open(
'${user.html_url}',
'_blank'
)">
💻 ${user.login}
</div>
`;

});
}

suggestionBox.innerHTML=html;
suggestionBox.style.display="block";

}
catch(error){

console.log(error);

}
}

async function searchPerson(){

const name=
document.getElementById("searchInput")
.value.trim();

if(!name) return;

saveHistory(name);

document.getElementById("loading")
.innerHTML="Searching...";

document.getElementById("wikiResult")
.innerHTML="";

document.getElementById("githubResult")
.innerHTML="";

await wikipediaSearch(name);
await githubSearch(name);

document.getElementById("loading")
.innerHTML="";

document.getElementById("suggestions")
.style.display="none";
}

async function wikipediaSearch(name){

try{

const response=
await fetch(
`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`
);

const data=
await response.json();

if(!data.title) return;

const image=
data.thumbnail ?
data.thumbnail.source :
"https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg";

document.getElementById("wikiResult")
.innerHTML=`

<div class="card">

<h2>📖 Wikipedia</h2>

<div class="profile">

<img src="${image}">

<div class="info">

<h2>${data.title}</h2>

<p>${data.extract || ''}</p>

<a
class="link-btn"
href="${data.content_urls.desktop.page}"
target="_blank">
Open Wikipedia
</a>

</div>

</div>

</div>
`;

}
catch(err){

console.log(err);

}
}

async function githubSearch(name){

try{

const response=
await fetch(
`https://api.github.com/search/users?q=${encodeURIComponent(name)}`
);

const data=
await response.json();

if(!data.items ||
!data.items.length) return;

const user=data.items[0];

const profile=
await fetch(user.url);

const p=
await profile.json();

document.getElementById("githubResult")
.innerHTML=`

<div class="card">

<h2>💻 GitHub</h2>

<div class="profile">

<img src="${p.avatar_url}">

<div class="info">

<h2>
${p.name || p.login}
</h2>

<p>
Followers : ${p.followers}
</p>

<p>
Public Repositories : ${p.public_repos}
</p>

<a
class="link-btn"
href="${p.html_url}"
target="_blank">
Open GitHub
</a>

</div>

</div>

</div>
`;

}
catch(err){

console.log(err);

}
}

document.addEventListener(
"click",
function(e){

if(!e.target.closest(".search-wrapper")){

document.getElementById("suggestions")
.style.display="none";

}

}
);

</script>

</body>
</html>
